<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: rgb(120, 96, 64);;
            text-decoration-color: white;
            background-size: cover;
            background-position: center;
            margin: 0;
        }
        header.title{
            border: 2px solid black;
            background-image: url(/images/filler-titlebg.png);
            background-size: cover;
            background-position: 0px 570px;
            height:auto;
            margin: 0;
        }
        #logo{
            border: 2px solid black;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            background-color: white;
        }
        h1{
            text-align: center;
            font-size: 50px;
            color: white;
            -webkit-text-stroke-width: 2px;
            -webkit-text-stroke-color: black;
        }
        #top{
            background-color: #759AAB;
            width: 30px;
            margin: auto;
            position: sticky;
            top: 0;
            text-align:center;
            font-size: 30px;
            border:2px solid black;
            width: 300px;
            z-index: 9999;
        }
        nav a{
            margin-right: 20px;
            color: #401F3E;
        }
        #formContainer{
            margin:auto;
            margin-top: 5px;
            background: white;
            width: 450px;
            height: 650px;
            border: navy;
            border-style: solid;
            border-width: 10px;
            border-radius: 30px;
        }
        #top{
            background-image: url(images/jesus_feeds_5000.jpeg);
            width: 450px;
            height: 200px;
            background-size: cover;
            border-radius: 20px 20px 0 0;
            display: grid;
            align-content: center;
            justify-content: center;
            padding-top: 25px;
            color: white;
            font-size: 20px;
        }
        #closeBtn{
            position: absolute;
            top: 25px;
            left: 563px;
        }

        h3{
            text-align: center;
            margin: 5px 0 0 5px;
        }

        #myForm{
            display: grid;
            padding: 20px;
            gap: 20px;
            grid-template-columns: 1fr 1fr;
        }

        #bottom{
            display: grid;
            grid-column: 1/3;
            text-align: center;
            gap: 15px;
        }
        #mostBottom{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 5px;
        }
        img{
            width: 100%;
            height: 109px;
        }
        #first{
            border-radius: 0 0 0 20px;
        }
        #last{
            border-radius: 0 0 2    0px 0;   
        }
    </style>




</head>

<body>
        <header class="title">     
    <img id="logo" src="/images/chrislogo.png" alt="chris logo">
    <h1>Christopher Ellis</h1>
    </header>
    <nav id="top">
        <a href="index.html">Home</a>
        <a href="wwr/index.html">wwr</a>
        <a href="ice/index.html">ICE</a>
    <div id="formContainer">
        <div id="top">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <div id = "bottom">
                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section>
                    <button type="submit">Submit</button>
                </section>
            </div>
        </form>
        <div id = "mostBottom">
            <img id="first" src="images/old_testament.webp" alt="old_testament">
            <img src="images/new_testament.webp" alt="new_testament">
            <img src="images/book_of_mormon.webp" alt="book_of_mormon">
            <img src="images/doctrine_and_covenants.webp" alt="doctrine_and_covenants">
            <img id="last" src="images/pearl_of_great_price.webp" alt="pearl_of_great_price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
