<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #514F59;
            text-decoration-color: white;
            background-size: cover;
            background-position: center;
            margin: 0;
        }
        header.title{
            border: 2px solid black;
            background-image: url(/images/filler-titlebg.png);
            background-size: cover;
            background-position: 0px 570px;
            height:auto;
            margin: 0;
        }
        #logo{
            border: 2px solid black;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            background-color: white;
        }
        h1{
            text-align: center;
            font-size: 50px;
            color: white;
            -webkit-text-stroke-width: 2px;
            -webkit-text-stroke-color: black;
        }
        #top{
            background-color: #759AAB;
            width: 30px;
            margin: auto;
            position: sticky;
            top: 0;
            text-align:center;
            font-size: 30px;
            border:2px solid black;
            width: 300px;
            z-index: 9999;
        }
        nav a{
            margin-right: 20px;
            color: #401F3E;
        }

        header h1 {
            margin: 0;
            font-weight: 400;
        }
        main {
            display: grid;
            grid-template-columns: .1fr .1fr 1fr .1fr;
            margin-top: 20px;
        }
        hr {
            width: 100%;
            grid-column: 1 / 5;
        }
        h2 {
            grid-column: 2/3;
        }

        #blue {
            background: blue;
            grid-column: 1 / 2;
            display: grid;
            align-items: center;
            justify-items: center;
        }

        #white {
            background: white;
            grid-column: 2 / 4;
        }

        #red {
            background: red;
            grid-column: 1 / 4;
        }

        #chile {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 200px;
            width: 300px;
        }

        .star {
            width: 70px;
            aspect-ratio: 1;
            background: white;
            clip-path: polygon(50% 0, 79% 90%, 2% 35%, 98% 35%, 21% 90%);
        }

        #denmark{
            display: grid;
            grid-template-columns: 3fr 1fr 5fr;
            grid-template-rows: 3fr 1fr 3fr;
            height: 200px;
            width: 300px;
        }
        #dred1 {
            background: red;
            grid-column: 1 / 4;
            grid-row: 1/4;
        }
        #dred2{
            background: white;
            grid-column: 1/4;
            grid-row: 2/3;
        }
        #dred3{
            background: white;
            grid-column: 2/3;
            grid-row:1/4;
        }
        #finland{
            display: grid;
            grid-template-columns: 3fr 2fr 5fr;
            grid-template-rows: 3fr 2fr 3fr;
            height: 200px;
            width: 300px;}
        #fwhite1{   
            background: white;
            grid-column: 1 / 4;
            grid-row: 1/4;
            }
        #fwhite2{
            background: blue;
            grid-column: 1/4;
            grid-row: 2/3;}
        #fwhite3{
            background: blue;
            grid-column: 2/3;
            grid-row:1/4;}
        #benin{
            display: grid;
            grid-template-columns: 6fr 6fr 9fr;
            grid-template-rows: 5fr 5fr 10fr;
            height: 200px;
            width: 300px;}
        #bgreen{
            background: green;
            grid-column: 1 / 3;
            grid-row: 1/4;}
        #byellow{
            background: yellow;
            grid-column: 2 / 4;
            grid-row: 1/3;
        }
        #bred{
            background: red;
            grid-column: 2/4;
            grid-row: 3/4;
        }
    </style>
</head>

<body>
    <header class="title">     
    <img id="logo" src="/images/chrislogo.png" alt="chris logo">
    <h1><h1>Using CSS Grid to make Country Flags</h1></h1>
    </header>
    <nav id="top">
        <a href="index.html">Home</a>
        <a href="wwr/index.html">wwr</a>
        <a href="ice/index.html">ICE</a>
    </nav>
    <main>
        <h2>Chile</h2>
        <div id="chile">
            <div id="blue">
                <div class="star"></div>
            </div>
            <div id="white"></div>
            <div id="red"></div>
        </div>
        <hr>

        <h2>Denmark</h2>
        <div id="denmark">
            <div id="dred1"></div>
            <div id="dred2"></div>
            <div id="dred3"></div>
            <div id="dred4"></div>
        </div>
        <hr>

        <h2>Finland</h2>
        <div id="finland">
            <div id="fwhite1"></div>
            <div id="fwhite2"></div>
            <div id="fwhite3"></div>
            <div id="fwhite4"></div>
        </div>
        <hr>

        <h2>Benin</h2>
        <div id="benin">
            <div id="bgreen"></div>
            <div id="byellow"></div>
            <div id="bred"></div>
        </div>
        <hr>
    </main>
</body>

</html>
